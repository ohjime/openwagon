<!--
Reusable drawer content component.

Renders the four regions every drawer shares — title, header actions, body
and footer actions — into the layout that gets swapped into #trip_drawer_content
by core.views.show_trip (the one shared drawer in the app, the trip detail).

    c-drawer title="Trip T-1024"
        c-slot name="header_actions"
            button class="btn btn-sm" — Edit
        /c-slot

        p — …main body content…

        c-slot name="footer_actions"
            button class="btn btn-primary btn-sm" — Save
        /c-slot
    /c-drawer

`title` is a prop; `header_actions` and `footer_actions` are named slots; the
default slot is the main body.
-->
<c-vars title="" />
<div class="flex h-full flex-col">
    <!-- Header: title + header actions + close -->
    <div class="flex items-center justify-between gap-4 border-b border-base-300 bg-base-200/40 px-4 py-3">
        <h3 class="truncate text-lg font-semibold">{{ title|default:"Details" }}</h3>
        <div class="flex flex-shrink-0 items-center gap-2">
            {{ header_actions }}
            {# djlint:off #}
            <button class="btn btn-ghost btn-sm btn-circle"
                    @click="$dispatch('close-drawer')"
                    aria-label="Close drawer">✕</button>
            {# djlint:on #}
        </div>
    </div>
    <!-- Body: main content -->
    <div class="flex-1 overflow-auto p-4">{{ slot }}</div>
    <!-- Footer: footer actions -->
    {% if footer_actions %}
        <div class="flex items-center justify-end gap-2 border-t border-base-300 bg-base-200 p-4">{{ footer_actions }}</div>
    {% endif %}
</div>
