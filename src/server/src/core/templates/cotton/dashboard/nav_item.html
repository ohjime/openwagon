<!--
A single sidebar nav link. The icon (default slot = the inner path … of a
0 -960 960 960 viewBox SVG) is always visible; the label fades/expands in when
the sidebar opens.

    c-dashboard.nav-item label="Trips" key="trips" url="/trips/" target="#content"
        path d="…"
    /c-dashboard.nav-item

`url` + `target` wire an htmx innerHTML swap; omit `target` for a plain link
(full navigation via href). `section` overrides the temp-state section key
(defaults to `url`) — items sharing a key are treated as one section by the
press-to-collapse behaviour on the parent c-dashboard.navbar.

`key` ties this item to the active-page indicator: when it matches the navbar's
activeKey (set by nav_response) the link stays lit, and shows an arrowhead right
after the label once the rail is open.
-->
<c-vars label="" url="#" target="" section="" key="" />
<li data-nav-section="{{ section|default:url }}"
    data-nav-key="{{ key }}"
    data-nav-label="{{ label }}">
    {# djlint:off #}
    <a {% if target %}hx-get="{{ url }}" hx-target="{{ target }}" hx-swap="innerHTML"{% else %}href="{{ url }}"{% endif %}
       @click="selectItem($el)"
       @mouseenter="itemEnter($el)"
       @mouseleave="itemLeave()"
       :class="isActive('{{ key }}') ? 'bg-base-200/60 text-base-content font-semibold' : ''"
       class="mx-1 flex h-full cursor-pointer items-center gap-2 rounded-lg px-2 py-1.5 transition-color duration-200 hover:bg-base-200 hover:text-base-content">
        <span class="flex h-full w-9 flex-shrink-0 items-center justify-center rounded-lg [&_svg]:size-full">
            <!-- The icon is a full c-icons.* component dropped in by the caller. -->
            {{ slot }}
        </span>
        <span class="flex-shrink-0 truncate transition-opacity delay-75 duration-200"
              :class="hoverDrawer || toggleDrawer || mobileOpen ? 'opacity-100' : 'w-0 opacity-0'">
            {{ label }}
        </span>
        <!-- Active indicator: a soft (round-joined) left arrowhead right after the label, shown only while the rail is open -->
        <c-icons.caret-left class="h-4 w-4 flex-shrink-0 text-primary"
                            x-show="isActive('{{ key }}') && (hoverDrawer || toggleDrawer || mobileOpen)"
                            x-cloak />
    </a>
    {# djlint:on #}
</li>
