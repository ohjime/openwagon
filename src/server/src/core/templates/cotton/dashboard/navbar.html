<!--
Single app-shell navbar: the top header and the collapsing left sidebar in one
self-contained component. The header's left block shares the sidebar's width and
`bg-base-300`, so the two line up as one continuous column — that alignment is
the whole point of keeping them together.

Behaviour (all Alpine state lives on this component's root — nothing leaks to the
page):
  - collapsed to an icon rail (w-20) by default
  - expands to w-80 on hover, OR stays pinned open when the toggle is clicked
  - listens for the `nav:close` window event to un-pin/collapse (htmx views fire
    this via HX-Trigger-After-Swap — see core.dashboard.nav_response)

Usage — the default slot is the page content; everything else has a sensible
default you can override:

    c-dashboard.navbar dashboard_name="Dispatch Center" content_id="content"
        c-slot name="actions" …New Trip / profile… /c-slot
        c-slot name="nav_items" li…/li /c-slot
        c-slot name="footer" …Admin… /c-slot

        page content lands in the #content_id element
    /c-dashboard.navbar

`dashboard_name`, `content_id` and `active` are props; `actions`, `nav_items`
and `footer` are named slots. `dashboard_name` is the fixed header label (it
never changes within a feature); the active destination shows as a breadcrumb
trail beneath it, derived from `active`. htmx nav links target `#content_id`.
-->
<c-vars dashboard_name="Dashboard" content_id="content" active="" />
{# djlint:off #}
<div x-data="{
        toggleDrawer: false, hoverDrawer: false, mobileOpen: false, hoverTimer: null, resizing: false, resizeTimer: null, isMobile: window.innerWidth < 768,
        // Active-page indicator. The current route is the single source of truth:
        // the server seeds `activeKey` on a full load, and an htmx swap fires
        // `nav:active` (see core.dashboard.nav_response) to move it. Nothing on
        // the page tracks this — one key, set server-side, nudged by one event.
        // isActive() lights a leaf; sectionActive() lights a parent section when
        // one of its children is the active page (discovered from the DOM via
        // data-nav-key, so a section never repeats its child keys).
        activeKey: '{{ active|escapejs }}',
        isActive(key) { return !!key && this.activeKey === key },
        // Breadcrumb trail under the (fixed) header label: the active leaf's
        // label, preceded by any ancestor section name(s). Derived from the DOM
        // — data-nav-label on leaves, data-nav-name on sections — so the view
        // only ever supplies a key and nested nav yields multiple crumbs for
        // free. Each crumb is { label, icon } where icon is the leading <svg>
        // markup lifted from that nav entry, so the trail mirrors the sidebar
        // icons. Recomputed on a full load (init) and after every htmx swap.
        crumbs: [],
        computeCrumbs() {
            const out = [];
            const el = this.activeKey
                ? this.$root.querySelector('[data-nav-key=\'' + this.activeKey + '\']')
                : null;
            if (el) {
                // The leading <svg> of a nav entry is its main icon (it precedes
                // the label, the active-indicator caret and any chevron in DOM
                // order), so the first match is always the right one to clone.
                const iconOf = (node) => {
                    const svg = node ? node.querySelector('svg') : null;
                    return svg ? svg.outerHTML : '';
                };
                const sections = [];
                let node = el.parentElement ? el.parentElement.closest('[data-nav-name]') : null;
                while (node) {
                    sections.unshift({ label: node.dataset.navName, icon: iconOf(node) });
                    node = node.parentElement ? node.parentElement.closest('[data-nav-name]') : null;
                }
                out.push(...sections, { label: el.dataset.navLabel || '', icon: iconOf(el) });
            }
            this.crumbs = out;
        },
        init() { this.$nextTick(() => this.computeCrumbs()) },
        sectionActive(el) { return !!this.activeKey && !!(el && el.querySelector('[data-nav-key=\'' + this.activeKey + '\']')) },
        // Temporary 'untoggled' state: when a nav item is clicked while the sidebar
        // is NOT pinned it fully collapses (uninterruptible for the 300ms transition
        // via `collapsing`). Only AFTER the collapse finishes do we decide the temp
        // state by reading whatever the mouse is actually resting on once the layout
        // has settled (document.elementFromPoint at the tracked pointer position):
        //   - over the navbar -> temp state, anchored to the section under the mouse
        //     NOW (items reflow as the drawer collapses, so this may differ from the
        //     one that was clicked — we trust the pointer, not the click).
        //   - outside the navbar -> normal hover flow
        // While in temp state the ONLY thing that reopens it is entering a DIFFERENT
        // section. Dead space (the gap between the button and the rail edge, row
        // gaps, nav padding) keeps it collapsed so it feels like you're still on the
        // section you just picked. Leaving the navbar clears temp -> normal next time.
        // Pressing the SAME selected section again while in temp state opens the
        // drawer (acts as a toggle) and resumes normal behaviour; `forceOpen` keeps
        // it open through the htmx `nav:close` that the re-navigation fires.
        // `currentSection` tracks the section under the mouse; `inDrawer` whether the
        // mouse is within the header/sidebar hover region; `mouseX/mouseY` the last
        // pointer position (used to resolve the resting item after the reflow).
        tempUntoggled: false, selectedSection: null, currentSection: null, inDrawer: false, collapsing: false, collapseTimer: null, forceOpen: false, mouseX: 0, mouseY: 0,
        enterDrawer() { this.inDrawer = true; clearTimeout(this.hoverTimer); if (this.collapsing || this.tempUntoggled) return; this.hoverDrawer = true },
        leaveDrawer(e) {
            this.inDrawer = false;
            clearTimeout(this.hoverTimer);
            // Leaving the hover region collapses the drawer AND drops any temp state
            // so the next entry is a normal hover. Crossing between the header block
            // and the nav cancels this via enterDrawer's clearTimeout, so it only
            // fires once the mouse is genuinely outside the navbar boundaries.
            this.hoverTimer = setTimeout(() => { this.hoverDrawer = false; this.tempUntoggled = false; this.selectedSection = null }, e && e.clientX <= 0 ? 700 : 200);
        },
        selectItem(el) {
            if (this.toggleDrawer) return;
            const section = el.closest('[data-nav-section]');
            const key = section ? section.dataset.navSection : null;
            // Second press on the section we're already in temp state for -> open
            // the drawer and carry on as a normal hovered-open drawer.
            if (this.tempUntoggled && key !== null && key === this.selectedSection) {
                clearTimeout(this.hoverTimer);
                clearTimeout(this.collapseTimer);
                this.collapsing = false;
                this.tempUntoggled = false;
                this.selectedSection = null;
                this.forceOpen = true;    // survive the htmx nav:close that follows
                this.hoverDrawer = true;
                return;
            }
            clearTimeout(this.hoverTimer);
            this.selectedSection = key;
            this.tempUntoggled = false;   // decided after the collapse finishes
            this.hoverDrawer = false;     // collapse
            this.collapsing = true;
            clearTimeout(this.collapseTimer);
            this.collapseTimer = setTimeout(() => {
                this.collapsing = false;
                // The layout has settled; resolve what the pointer is actually over
                // now (items shift as the drawer narrows) instead of trusting `key`.
                const el = document.elementFromPoint(this.mouseX, this.mouseY);
                const overHover = !!(el && el.closest && el.closest('[data-drawer-hover]'));
                const sectionEl = el && el.closest ? el.closest('[data-nav-section]') : null;
                this.inDrawer = overHover;
                this.currentSection = sectionEl ? sectionEl.dataset.navSection : null;
                if (overHover) {
                    // anchor the temp state to whatever item the mouse rests on now
                    this.selectedSection = this.currentSection;
                    this.tempUntoggled = true;
                } else {
                    // mouse ended up outside the navbar -> normal hover flow
                    this.selectedSection = null;
                }
            }, 300);
        },
        itemEnter(el) {
            const section = el.closest('[data-nav-section]');
            this.currentSection = section ? section.dataset.navSection : null;
            if (this.collapsing || !this.tempUntoggled) return;
            // Only a DIFFERENT section reopens; the selected one (and dead space) stays collapsed.
            if (this.currentSection === null || this.currentSection === this.selectedSection) return;
            this.tempUntoggled = false; this.selectedSection = null; this.hoverDrawer = true;
        },
        itemLeave() { this.currentSection = null }
     }"
     @nav:active.window="activeKey = $event.detail.key; computeCrumbs()"
     @nav:close.window="clearTimeout(hoverTimer); if (forceOpen) { forceOpen = false } else { hoverDrawer = false } mobileOpen = false"
     @mousemove.window="mouseX = $event.clientX; mouseY = $event.clientY"
     @resize.window="let nowMobile = window.innerWidth < 768; if (isMobile !== nowMobile) { if (!nowMobile) { mobileOpen = false } else { toggleDrawer = false; hoverDrawer = false } isMobile = nowMobile }; resizing = true; clearTimeout(resizeTimer); resizeTimer = setTimeout(() => resizing = false, 100)"
     class="flex h-screen w-screen flex-col overscroll-y-none font-sans">
    <!-- Header: the left block's width + bg track the sidebar so they align -->
    <header class="flex h-20 w-full flex-row items-center bg-base-300 md:bg-base-100">
        <div data-drawer-hover
             class="flex h-20 w-20 min-w-20 items-center justify-between bg-base-300 px-2"
             :class="(hoverDrawer || toggleDrawer ? 'md:w-80 md:min-w-80 md:bg-base-300/70 md:backdrop-blur-md' : 'md:w-20 md:min-w-20') + (resizing ? '' : ' transition-all duration-300')"
             @mouseenter="enterDrawer()"
             @mouseleave="leaveDrawer($event)">
            <!-- Mobile only: hamburger replaces the logo/pin rail and toggles the
                 full-screen nav overlay. Morphs to an ✕ while the nav is open. -->
            <button class="flex h-16 w-16 flex-shrink-0 items-center justify-center rounded-lg text-base-content/60 transition-colors hover:bg-base-100 hover:text-base-content/80 md:hidden"
                    @click="mobileOpen = !mobileOpen"
                    :aria-expanded="mobileOpen"
                    aria-label="Toggle navigation">
                <svg x-show="!mobileOpen"
                     xmlns="http://www.w3.org/2000/svg"
                     height="32px"
                     viewBox="0 -960 960 960"
                     width="32px"
                     fill="currentColor">
                    <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
                </svg>
                <svg x-show="mobileOpen"
                     x-cloak
                     xmlns="http://www.w3.org/2000/svg"
                     height="32px"
                     viewBox="0 -960 960 960"
                     width="32px"
                     fill="currentColor">
                    <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                </svg>
            </button>
            <!-- Desktop only: logo -->
            <div class="hidden h-16 w-16 flex-shrink-0 items-center justify-center p-2 md:flex">
                <span class="truncate text-2xl font-extrabold tracking-wide transition-colors duration-300"
                      :class="hoverDrawer || toggleDrawer ? 'text-base-content/70' : 'text-base-content/30'">W</span>
            </div>
            <!-- Desktop only: title (slides in once sidebar has expanded) -->
            <div x-show="hoverDrawer || toggleDrawer"
                 x-cloak
                 x-transition:enter="transition-all duration-200 ease-out delay-50"
                 x-transition:enter-start="opacity-0 -translate-x-6"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition-opacity duration-75 ease-in"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="hidden flex-1 min-w-0 items-center md:flex">
                <span class="-ml-5 truncate text-lg font-semibold tracking-wide text-base-content/80">AYGON</span>
            </div>
            <!-- Desktop only: pin toggle -->
            <div class="hidden h-16 w-16 flex-shrink-0 items-center justify-center md:flex">
                <button class="flex h-full w-full cursor-pointer items-center justify-end px-2 transition-all duration-200"
                        @click="toggleDrawer = !toggleDrawer; if (!toggleDrawer) hoverDrawer = false"
                        :class="hoverDrawer || toggleDrawer ? 'opacity-100' : 'opacity-0'"
                        aria-label="Pin navigation">
                    <svg class="rounded-lg p-0.5 transition-all duration-75"
                         :class="toggleDrawer ? 'hover:bg-base-200 hover:text-base-content/80 text-base-content/60' : 'hover:bg-base-100 hover:text-base-content/80 text-base-content/50'"
                         xmlns="http://www.w3.org/2000/svg"
                         height="32px"
                         viewBox="0 -960 960 960"
                         width="32px"
                         fill="currentColor">
                        <path d="M120-240v-80h520v80H120Zm664-40L584-480l200-200 56 56-144 144 144 144-56 56ZM120-440v-80h400v80H120Zm0-200v-80h520v80H120Z" />
                    </svg>
                </button>
            </div>
        </div>
        <!-- Fixed feature label, always vertically centered in the header (in
             line with the logo + hamburger). The active destination renders as a
             breadcrumb trail rebuilt from `activeKey` by walking the sidebar DOM
             (see computeCrumbs) — nested nav yields multiple crumbs on its own.
             The trail is absolutely positioned directly under the label and
             left-aligned to it, so it never shifts the label off-center and can
             spill below the header if it ever runs long; it's desktop-only
             (hidden on mobile). Left padding is tight on mobile (label sits close
             to the hamburger) and opens up at md; transition-[padding] glides it
             across the breakpoint instead of jumping. -->
        <div class="px-3 transition-[padding] duration-300 md:px-12 flex flex-col items-start justify-evenly md:pt-3 h-20">
            <div class="text-2xl font-sans">{{ dashboard_name }}</div>
                <!-- max-w-none + overflow-visible override daisyUI's max-width:100%
                   / overflow-x:auto, which otherwise clamp the trail to the
                   label's width and show a scrollbar; freed, it grows rightward
                   into the open space up to the action buttons. -->
                <div class="top-full mt-0.5 hidden max-w-none breadcrumbs overflow-visible py-0 text-sm text-base-content md:block"
                     x-show="crumbs.length"
                     x-cloak>
                    <ul>
                        <template x-for="(crumb, i) in crumbs" :key="i">
                            <li>
                                <span class="inline-flex items-center gap-1.5">
                                    <!-- icon cloned from the sidebar entry; sized
                                       here since the sidebar's wrapper styling
                                       doesn't follow the clone. -->
                                    <template x-if="crumb.icon">
                                        <span class="[&_svg]:size-4 [&_svg]:shrink-0"
                                              x-html="crumb.icon"></span>
                                    </template>
                                    <span x-text="crumb.label"></span>
                                </span>
                            </li>
                        </template>
                    </ul>
                </div>
        </div>
        <div class="flex-1"></div>
        <!-- Header actions. Core sets NOTHING here — it only renders whatever an
             app hands in through the `actions` slot (sourced from app/base.html's
             nav_actions block). The if-guard keeps the area genuinely empty when
             no actions are given: an unfilled slot is whitespace, so we test
             `actions.strip` — no wrapper and no stray padding render for an app
             that supplies no actions. -->
        {% if actions.strip %}
            <div class="flex flex-row items-center gap-4 pl-4 pr-8">
                {{ actions }}
            </div>
        {% endif %}
    </header>
    <!-- Body: fixed sidebar (overlays content when expanded; pin pushes it) -->
    <div class="flex h-[calc(100vh-5rem)] flex-1 flex-row">
        <!-- Below md the nav is a full-screen overlay toggled by `mobileOpen`:
             x-show drives its display, so when closed it is display:none (not just
             translated off-screen) — that's what kills the "jet out then recede"
             when the viewport crosses the md breakpoint. x-transition slides it
             in/out first, then hides it. At md+ the `md:flex!` important utility
             overrides x-show's inline display:none, so the rail is always shown. -->
        <nav data-drawer-hover
             x-show="mobileOpen"
             x-cloak
             x-transition:enter="transition-transform duration-300 ease-in-out"
             x-transition:enter-start="-translate-x-full"
             x-transition:enter-end="translate-x-0"
             x-transition:leave="transition-transform duration-300 ease-in-out"
             x-transition:leave-start="translate-x-0"
             x-transition:leave-end="-translate-x-full"
             class="fixed top-20 bottom-0 left-0 z-40 flex w-full flex-col items-start bg-base-300 px-2.5 text-base-content md:z-10 md:flex! md:translate-x-0"
             :class="(hoverDrawer || toggleDrawer ? 'md:w-80 md:bg-base-300/70 md:backdrop-blur-md' : 'md:w-20') + (resizing ? '' : ' md:transition-all md:duration-300')"
             @mouseenter="enterDrawer()"
             @mouseleave="leaveDrawer($event)">
            <hr class="h-0.5 min-h-0.5 mb-4 w-full rounded-full border-0"
                :class="hoverDrawer || toggleDrawer || mobileOpen ? 'bg-neutral-300/80' : 'bg-neutral-300/60'">
            <ul class="flex w-full min-h-0 flex-auto flex-col gap-3 overflow-x-hidden overflow-y-auto"
                :class="hoverDrawer || toggleDrawer || mobileOpen ? 'text-base-content/70' : 'text-base-content/30'">
                <!-- Sidebar entries come from the `nav_items` slot. Core ships no
                   defaults so it stays free of any app's routes — the consuming
                   app supplies c-dashboard.nav-item/c-dashboard.nav-section/
                   c-dashboard.nav-child entries (see app/base.html). -->
                {{ nav_items }}
            </ul>
            <div class="flex flex-1"></div>
            <hr class="h-0.5 min-h-0.5 mb-4 mt-2 w-full rounded-full border-0"
                :class="hoverDrawer || toggleDrawer || mobileOpen ? 'bg-neutral-300/80' : 'bg-neutral-300/60'">
            <div class="mb-4 h-fit"
                 :class="hoverDrawer || toggleDrawer || mobileOpen ? 'text-base-content/70' : 'text-base-content/30'">
                {% if footer %}
                    {{ footer }}
                {% else %}
                    <a href="{% url 'admin:index' %}"
                       class="mx-1 flex h-full items-center gap-2 rounded-lg px-2 py-1.5 transition-color duration-200 hover:bg-base-200 hover:text-base-content">
                        <svg class="flex h-full flex-shrink-0 items-center justify-center rounded-lg"
                             xmlns="http://www.w3.org/2000/svg"
                             height="36px"
                             viewBox="0 -960 960 960"
                             width="36px"
                             fill="currentColor">
                            <path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z" />
                        </svg>
                        <span class="flex-shrink-0 truncate transition-opacity delay-75 duration-200"
                              :class="hoverDrawer || toggleDrawer || mobileOpen ? 'w-full opacity-100' : 'w-0 opacity-0'">
                            Admin Settings
                        </span>
                    </a>
                {% endif %}
            </div>
        </nav>
        <section id="{{ content_id }}"
                 class="ml-0 flex-1 overflow-auto py-4 pl-8 pr-4"
                 :class="(toggleDrawer ? 'md:ml-80' : 'md:ml-20') + (resizing ? '' : ' transition-all duration-300')">
            {{ slot }}
        </section>
    </div>
</div>
{# djlint:on #}
