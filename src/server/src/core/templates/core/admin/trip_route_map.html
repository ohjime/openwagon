<!--
Row-expand preview for TripAdmin (core.admin.TripRouteMapSection): the
origin -> destination route on Google Maps. Same lazy-init-on-expand approach
as the zone map (see service_plan_zone_map.html) so a paginated list doesn't
spin up one Google Map per row on load — and the same guarded singleton
loader script id ("google-maps-js") the dispatcher trip drawer uses
(core/templates/core/trip_detail.html), since the two never render on the
same page.
-->
{% load unfold %}
{% component "unfold/components/card.html" with title="Route" size="md" %}
    <!-- aspect-video isn't in Unfold's precompiled CSS bundle (see
         service_plan_zone_map.html) — inline style stands in. -->
    <div class="relative w-full"
         style="aspect-ratio: 16 / 9;"
         data-map-id="{{ map_id }}"
         data-maps-key="{{ maps_api_key|default_if_none:'' }}"
         data-origin-id="{{ trip.origin.id|default_if_none:'' }}"
         data-destination-id="{{ trip.destination.id|default_if_none:'' }}"
         data-driver-lat="{{ driver_location.lat|default_if_none:'' }}"
         data-driver-lng="{{ driver_location.lng|default_if_none:'' }}"
         data-driver-label="{{ driver_location.label|default_if_none:'' }}"
         x-data="{ started: false }"
         x-effect="if (rowOpen && !started) { started = true; $nextTick(() => initTripRouteMap($el)) }">
        <div id="{{ map_id }}"
             class="absolute inset-0 overflow-hidden rounded-default border border-base-200 dark:border-base-800"></div>
    </div>
    <p class="mt-3 flex flex-col gap-1 text-sm">
        <span><strong class="font-medium">From:</strong> {{ trip.origin.address }}</span>
        <span><strong class="font-medium">To:</strong> {{ trip.destination.address }}</span>
    </p>
{% endcomponent %}
{# djlint:off #}
<script>
    (function () {
        function loadGoogleMaps(key, cb) {
            if (window.google && window.google.maps) { cb(); return; }
            var id = 'google-maps-js';
            var existing = document.getElementById(id);
            if (existing) {
                existing.addEventListener('load', cb, { once: true });
                return;
            }
            var s = document.createElement('script');
            s.id = id;
            s.async = true;
            s.defer = true;
            s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key);
            s.onload = cb;
            document.head.appendChild(s);
        }

        // The row's `<tr x-show="rowOpen">` hasn't necessarily finished sizing
        // the container the instant $nextTick fires (same issue trip_detail.html
        // solves for the drawer) — a 0-size map at init renders wrong, so wait
        // for a real box first.
        function waitForSize(el, tries) {
            return new Promise(function (resolve) {
                function check(n) {
                    if (!el.isConnected || n <= 0 || (el.offsetWidth > 0 && el.offsetHeight > 0)) {
                        resolve();
                    } else {
                        requestAnimationFrame(function () { check(n - 1); });
                    }
                }
                check(tries || 120);
            });
        }

        window.initTripRouteMap = window.initTripRouteMap || function (root) {
            loadGoogleMaps(root.dataset.mapsKey, function () {
                var el = document.getElementById(root.dataset.mapId);
                if (!el || el.dataset.initialized) return;
                el.dataset.initialized = 'true';

                waitForSize(el).then(function () {
                    var map = new google.maps.Map(el, {
                        center: { lat: 53.5461, lng: -113.4938 },
                        zoom: 11,
                        mapTypeControl: false,
                        streetViewControl: false,
                        fullscreenControl: false,
                    });

                    // The assigned driver's current position — their vehicle's
                    // last reported fix — dropped as a distinct blue dot. Absent
                    // when the trip has no driver, no vehicle, or no fix yet (see
                    // TripRouteMapSection).
                    var driverLat = parseFloat(root.dataset.driverLat);
                    var driverLng = parseFloat(root.dataset.driverLng);
                    var hasDriver = !isNaN(driverLat) && !isNaN(driverLng);
                    if (hasDriver) {
                        new google.maps.Marker({
                            position: { lat: driverLat, lng: driverLng },
                            map: map,
                            title: root.dataset.driverLabel || 'Driver location',
                            zIndex: 999,
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 8,
                                fillColor: '#2563eb',
                                fillOpacity: 1,
                                strokeColor: '#ffffff',
                                strokeWeight: 2,
                            },
                        });
                        map.setCenter({ lat: driverLat, lng: driverLng });
                    }

                    var originId = root.dataset.originId;
                    var destinationId = root.dataset.destinationId;
                    if (!originId || !destinationId) return;

                    var directionsService = new google.maps.DirectionsService();
                    // preserveViewport when a driver marker is also on the map:
                    // we frame route + driver together below rather than letting
                    // the renderer zoom to just the route.
                    var directionsRenderer = new google.maps.DirectionsRenderer({
                        map: map,
                        preserveViewport: hasDriver,
                    });
                    directionsService.route({
                        origin: { placeId: originId },
                        destination: { placeId: destinationId },
                        travelMode: google.maps.TravelMode.DRIVING,
                    }, function (res, status) {
                        if (status !== 'OK') {
                            console.warn('Directions request failed:', status);
                            return;
                        }
                        directionsRenderer.setDirections(res);
                        if (hasDriver && res.routes[0] && res.routes[0].bounds) {
                            var bounds = new google.maps.LatLngBounds();
                            bounds.union(res.routes[0].bounds);
                            bounds.extend({ lat: driverLat, lng: driverLng });
                            map.fitBounds(bounds);
                        }
                    });
                });
            });
        };
    })();
</script>
{# djlint:on #}
